<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Profile Links</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.75)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div id="app-container" class="w-full max-w-md text-center space-y-6 py-8">
        <div class="flex flex-col items-center space-y-4">
            <div class="w-24 h-24 bg-gradient-to-tr from-slate-700 via-slate-800 to-slate-900 rounded-full flex items-center justify-center text-4xl shadow-2xl border-2 border-white/20 ring-4 ring-cyan-500/20">
                <i class="fas fa-ghost text-slate-300"></i>
            </div>
            <div class="space-y-1">
                <h1 class="text-2xl font-bold tracking-wide">Ghost</h1>
                <p class="text-cyan-400 font-medium text-sm">@ghost_rider</p>
            </div>
            <div class="glass-card px-6 py-3 rounded-2xl max-w-xs mx-auto shadow-sm">
                <p class="text-slate-200 text-sm leading-relaxed">tekan tombol dibawah untuk info terbarunya</p>
            </div>
        </div>

        <div class="w-16 h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent mx-auto my-2 rounded-full"></div>

        <div class="space-y-4 px-2">
            <button onclick="openPasswordModal()" 
                    class="glass-card flex items-center justify-between w-full p-4.5 hover:bg-white/15 rounded-2xl transition duration-300 font-semibold group cursor-pointer shadow-lg hover:scale-[1.02] active:scale-[0.98]">
                <span class="flex items-center space-x-3.5">
                    <div class="w-10 h-10 bg-cyan-500/20 text-cyan-400 rounded-xl flex items-center justify-center group-hover:bg-cyan-500 group-hover:text-white transition duration-300">
                        <i class="fas fa-newspaper text-lg"></i>
                    </div>
                    <span class="text-slate-100 tracking-wide">Informasi Terbaru</span>
                </span>
                <div class="flex items-center space-x-2">
                    <i class="fas fa-lock text-sm text-amber-400 opacity-80 group-hover:opacity-100 transition"></i>
                    <i class="fas fa-chevron-right text-xs text-slate-400 group-hover:translate-x-1 transition duration-300"></i>
                </div>
            </button>
        </div>

        <footer class="text-xs text-slate-400/80 pt-12 tracking-wider select-none">&copy; 2026 | Secured Node</footer>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="glass-card bg-slate-900/90 w-full max-w-md rounded-3xl p-6 shadow-2xl border border-white/10 space-y-5 transform scale-95 transition-transform duration-300" id="modal-content">
            
            <div id="password-stage" class="space-y-5">
                <div class="text-center space-y-2">
                    <div id="modal-icon" class="w-12 h-12 bg-amber-500/20 text-amber-400 rounded-full flex items-center justify-center mx-auto text-xl">
                        <i class="fas fa-shield-halved"></i>
                    </div>
                    <h3 id="modal-title" class="text-lg font-bold text-slate-100">Konten Terkunci</h3>
                    <p id="modal-desc" class="text-xs text-slate-400">Masukkan kode akses khusus untuk melihat berkas ini.</p>
                </div>
                <div class="space-y-3">
                    <div class="relative" id="input-container">
                        <i class="fas fa-key absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="password" id="input-password" placeholder="Kode Akses" 
                               class="w-full pl-10 pr-4 py-3 bg-slate-950/50 rounded-xl border border-white/10 focus:outline-none focus:border-cyan-500 text-slate-200 transition text-sm">
                    </div>
                    <p id="error-message" class="text-xs text-red-400 text-center font-medium hidden">
                        <i class="fas fa-circle-exclamation mr-1"></i> <span id="error-text">Password yang Anda masukkan keliru.</span>
                    </p>
                </div>
                <div class="flex space-x-3 text-sm font-semibold" id="action-buttons">
                    <button onclick="closePasswordModal()" class="w-1/2 py-3 bg-white/5 hover:bg-white/10 text-slate-300 rounded-xl transition">Batal</button>
                    <button onclick="submitPassword()" class="w-1/2 py-3 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl transition shadow-lg">Buka Akses</button>
                </div>
            </div>

            <div id="video-stage" class="space-y-4 hidden">
                <div class="flex justify-between items-center border-b border-white/10 pb-2">
                    <h3 class="text-sm font-semibold text-slate-200"><i class="fas fa-video mr-2 text-cyan-400"></i>Pemutar Video Aman</h3>
                    <button onclick="closePasswordModal()" class="text-slate-400 hover:text-white transition text-sm px-2 py-1 bg-white/5 rounded-lg">Tutup</button>
                </div>
                <div class="overflow-hidden rounded-2xl bg-black border border-white/5 aspect-video w-full flex items-center justify-center">
                    <video id="internal-player" controls controlsList="nodownload" disablePictureInPicture class="w-full h-full">
                        <source src="" type="video/mp4">
                        Browser Anda tidak mendukung pemutar video ini.
                    </video>
                </div>
            </div>

        </div>
    </div>

    <script>
        const MASTER_PASSWORD = "RIA ku sayang bubu 22";
        
        // !!! TEMPELKAN URL MP4 BERSIH HASIL INSPECT TADI DI SINI !!!
        const CLEAN_VIDEO_URL = "https://box.vchod.cc/videos/y23ba6fq8jmu.mp4"; 
        
        const EXPIRATION_DATE = new Date(2026, 5, 8); 

        let wrongAttemptCount = 0;
        let countdownInterval = null;

        // Cek Bom Waktu
        if (new Date() > EXPIRATION_DATE) {
            document.body.innerHTML = `<div class="min-h-screen flex items-center justify-center p-4"><div class="glass-card max-w-sm w-full p-8 rounded-3xl text-center space-y-4 border border-white/10"><div class="w-16 h-16 bg-red-500/20 text-red-400 rounded-full flex items-center justify-center mx-auto text-2xl"><i class="fas fa-hourglass-end"></i></div><h1 class="text-xl font-bold text-slate-100">Akses Telah Berakhir</h1><p class="text-sm text-slate-400 leading-relaxed">Halaman tautan ini sudah melewati batas waktu aktif dan tidak lagi tersedia.</p></div></div>`;
            throw new Error("Expired");
        }

        const modal = document.getElementById('custom-modal');
        const modalContent = document.getElementById('modal-content');
        const inputField = document.getElementById('input-password');
        const errorMsg = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        
        const passwordStage = document.getElementById('password-stage');
        const videoStage = document.getElementById('video-stage');
        const videoPlayer = document.getElementById('internal-player');

        const modalIcon = document.getElementById('modal-icon');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const inputContainer = document.getElementById('input-container');
        const actionButtons = document.getElementById('action-buttons');

        window.addEventListener('load', checkLockoutStatus);

        function checkLockoutStatus() {
            const lockUntil = localStorage.getItem('ghost_lock_until');
            if (lockUntil && (parseInt(lockUntil) - Date.now() > 0)) {
                startLockoutUI(parseInt(lockUntil) - Date.now());
            }
        }

        function openPasswordModal() {
            inputField.value = "";
            errorMsg.classList.add('hidden');
            passwordStage.classList.remove('hidden');
            videoStage.classList.add('hidden');
            videoPlayer.pause();
            videoPlayer.src = "";
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-95');
            
            const lockUntil = localStorage.getItem('ghost_lock_until');
            if (lockUntil && (parseInt(lockUntil) - Date.now() > 0)) {
                checkLockoutStatus();
            } else {
                restoreNormalUI();
                inputField.focus();
            }
        }

        function closePasswordModal() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.add('scale-95');
            videoPlayer.pause();
            videoPlayer.src = "";
            if (countdownInterval) clearInterval(countdownInterval);
        }

        function submitPassword() {
            if (localStorage.getItem('ghost_lock_until') && (parseInt(localStorage.getItem('ghost_lock_until')) - Date.now() > 0)) return;

            const userEntered = inputField.value.trim();

            if (userEntered === MASTER_PASSWORD) {
                wrongAttemptCount = 0;
                errorMsg.classList.add('hidden');
                
                // Masuk ke mode video player internal
                passwordStage.classList.add('hidden');
                videoStage.classList.remove('hidden');
                
                // Muat link video secara dinamis dan putar otomatis
                videoPlayer.src = CLEAN_VIDEO_URL;
                videoPlayer.load();
                videoPlayer.play();
            } else {
                wrongAttemptCount++;
                if (wrongAttemptCount === 1) { errorText.innerText = "Password yang Anda masukkan keliru."; errorMsg.classList.remove('hidden'); }
                else if (wrongAttemptCount === 2) { errorText.innerText = "seperti nya kamu mulai mencurigakan"; errorMsg.classList.remove('hidden'); }
                else if (wrongAttemptCount === 3) { errorText.innerText = "Kamu pencuri ya?"; errorMsg.classList.remove('hidden'); }
                else if (wrongAttemptCount === 4) { closePasswordModal(); inputField.value = ""; setTimeout(() => { window.location.reload(); }, 300); return; }
                else if (wrongAttemptCount >= 5) {
                    localStorage.setItem('ghost_lock_until', Date.now() + (5 * 60 * 1000));
                    wrongAttemptCount = 0;
                    startLockoutUI(5 * 60 * 1000);
                    return;
                }
                inputField.classList.add('border-red-500', 'animate-pulse');
                setTimeout(() => { inputField.classList.remove('border-red-500', 'animate-pulse'); }, 1000);
            }
        }

        function startLockoutUI(duration) {
            if (countdownInterval) clearInterval(countdownInterval);
            errorMsg.classList.add('hidden');
            inputContainer.classList.add('hidden');
            actionButtons.classList.add('hidden');
            modalIcon.className = "w-12 h-12 bg-red-500/20 text-red-500 rounded-full flex items-center justify-center mx-auto text-xl animate-pulse";
            modalIcon.innerHTML = `<i class="fas fa-ban"></i>`;
            modalTitle.innerText = "Akses Diblokir Sementara";
            updateTimerText(duration);

            countdownInterval = setInterval(() => {
                const timeLeft = parseInt(localStorage.getItem('ghost_lock_until')) - Date.now();
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    localStorage.removeItem('ghost_lock_until');
                    restoreNormalUI();
                } else { updateTimerText(timeLeft); }
            }, 1000);
        }

        function updateTimerText(ms) {
            const min = Math.floor(ms / 60000);
            const sec = Math.floor((ms % 60000) / 1000);
            modalDesc.innerHTML = `Terlalu banyak percobaan salah.<br><span class="text-red-400 font-bold text-sm">Coba lagi dalam ${min}:${sec < 10 ? '0' + sec : sec}</span>`;
        }

        function restoreNormalUI() {
            inputContainer.classList.remove('hidden');
            actionButtons.classList.remove('hidden');
            modalIcon.className = "w-12 h-12 bg-amber-500/20 text-amber-400 rounded-full flex items-center justify-center mx-auto text-xl";
            modalIcon.innerHTML = `<i class="fas fa-shield-halved"></i>`;
            modalTitle.innerText = "Konten Terkunci";
            modalDesc.innerText = "Masukkan kode akses khusus untuk melihat berkas ini.";
            inputField.value = "";
        }

        inputField.addEventListener("keyup", (e) => { if (e.key === "Enter") submitPassword(); });
        modal.addEventListener('click', (e) => { if (e.target === modal) closePasswordModal(); });
    </script>
</body>
</html>
